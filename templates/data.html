<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Industry Data | SAVORA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        #particles-js { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
        .data-header-title {
            font-size: 3.5rem; font-weight: 800; line-height: 1.1; margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #fff, var(--text-dim));
            background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(0, 240, 255, 0.4);
        }
        
        @keyframes slideFadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim-item { animation: slideFadeUp 0.6s cubic-bezier(0.19, 1, 0.22, 1) forwards; opacity: 0; }
        
        .hotel-side-card {
            background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 15px; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; gap: 15px; align-items: flex-start; position: relative; overflow: hidden;
        }
        .hotel-side-card:hover, .hotel-side-card.selected { 
            transform: translateX(8px); background: rgba(0,240,255,0.08); 
            border-color: var(--accent-primary); box-shadow: -5px 0 20px rgba(0,240,255,0.25); 
        }
        .hotel-side-card.selected { background: rgba(0,240,255,0.15); border-left: 4px solid var(--neon-green); }
        .hotel-rank { font-size: 1.8rem; font-weight: 800; color: rgba(255,255,255,0.1); width: 35px; text-align: center; margin-top: -5px;}
        .hotel-side-card:hover .hotel-rank, .hotel-side-card.selected .hotel-rank { color: var(--accent-primary); text-shadow: 0 0 10px rgba(0,240,255,0.5); }
        .hotel-info { flex: 1; }
        .hotel-tag { 
            background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 6px; 
            font-size: 0.75rem; font-weight: 600; color: var(--text-dim); border: 1px solid rgba(255,255,255,0.05); 
        }

        /* Premium Map Clustering */
        .custom-cluster {
            background: rgba(0, 255, 136, 0.2); border: 2px solid var(--neon-green);
            border-radius: 50%; color: #fff; font-weight: 800; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px var(--neon-green), inset 0 0 10px var(--neon-green);
            animation: pulse-glow 2s infinite alternate;
        }
        @keyframes pulse-glow {
            0% { transform: scale(1); box-shadow: 0 0 10px var(--neon-green); }
            100% { transform: scale(1.1); box-shadow: 0 0 25px var(--neon-green); }
        }

        input[type=range] { width: 100%; margin-top: 5px; accent-color: var(--accent-primary); cursor: pointer;}
        
        .detail-card { display: flex; flex-direction: column; justify-content: space-between; height: 100%; padding: 1rem; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .stat-box { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; border: 1px solid var(--glass-border); text-align: center; }
        .stat-box-num { font-size: 2rem; font-weight: 800; margin-bottom: 5px; }
        .stat-box-lbl { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

    </style>
</head>
<body class="data-page physics-off">
    <div id="particles-js"></div>
    <div class="moving-gradient-bg" id="global-bg" style="z-index:-2;"></div>
    
    <!-- Gaming Style NGO Pop-up Modal -->
    <div id="ngo-modal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); z-index:9999; justify-content:center; align-items:center; opacity:0; transition:opacity 0.3s; pointer-events:none;">
        <div style="background:rgba(10, 15, 25, 0.95); border:1px solid var(--accent-primary); box-shadow:0 0 40px rgba(0,240,255,0.15); width:400px; padding:30px; border-radius:12px; position:relative; transform:scale(0.85); transition:transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events:auto;" id="ngo-modal-content">
            <button onclick="closeNGOModal()" style="position:absolute; top:15px; right:20px; background:transparent; border:none; color:var(--accent-primary); cursor:pointer; font-size:1.8rem; line-height:1;">&times;</button>
            <div style="text-align:center; margin-bottom:25px;">
                <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2" style="margin-bottom:10px; filter:drop-shadow(0 0 5px var(--accent-primary));"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                <h2 id="modal-ngo-name" style="color:#fff; font-size:1.4rem; text-transform:uppercase; letter-spacing:1px; text-shadow:0 0 10px rgba(255,255,255,0.2); margin-bottom:5px;">NGO Name</h2>
                <div id="modal-ngo-status" style="color:var(--neon-green); font-size:0.85rem; font-weight:600; letter-spacing:2px;">STATUS</div>
            </div>
            
            <div style="background:rgba(0,240,255,0.03); border:1px solid rgba(0,240,255,0.1); padding:15px; border-radius:8px; margin-bottom:25px; font-size:0.95rem;">
                <div style="display:flex; justify-content:space-between; margin-bottom:12px; border-bottom:1px dashed rgba(255,255,255,0.1); padding-bottom:8px;">
                    <span style="color:var(--text-dim)">Proximity Scan</span>
                    <span id="modal-ngo-dist" style="color:#fff; font-weight:bold;">0.0 km</span>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:12px; border-bottom:1px dashed rgba(255,255,255,0.1); padding-bottom:8px;">
                    <span style="color:var(--text-dim)">Fleet Vehicles Available</span>
                    <span style="color:var(--accent-primary); font-weight:bold;">3 Units</span>
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <span style="color:var(--text-dim)">ETA for Pickup</span>
                    <span style="color:#fff; font-weight:bold;">14 mins</span>
                </div>
            </div>
            
            <button onclick="confirmDispatch()" class="glow-btn" style="width:100%; padding:15px; background:var(--accent-primary); color:#000; font-weight:bold; font-size:1rem; border-radius:8px; cursor:pointer; letter-spacing:1px;">
                <span class="btn-text">CONFIRM DISPATCH</span>
            </button>
        </div>
    </div>

    <!-- SAVORA Success Pop-up Modal -->
    <div id="success-modal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); z-index:9999; justify-content:center; align-items:center; opacity:0; transition:opacity 0.3s; pointer-events:none;">
        <div style="background:rgba(10, 15, 25, 0.95); border:1px solid var(--neon-green); box-shadow:0 0 40px rgba(0,255,136,0.15); width:400px; padding:30px; border-radius:12px; position:relative; transform:scale(0.85); transition:transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events:auto;" id="success-modal-content">
            <button onclick="closeSuccessModal()" style="position:absolute; top:15px; right:20px; background:transparent; border:none; color:var(--neon-green); cursor:pointer; font-size:1.8rem; line-height:1;">&times;</button>
            <div style="text-align:center; margin-bottom:25px;">
                <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="var(--neon-green)" stroke-width="2" style="margin-bottom:10px; filter:drop-shadow(0 0 5px var(--neon-green));"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <h2 style="color:#fff; font-size:1.4rem; text-transform:uppercase; letter-spacing:1px; text-shadow:0 0 10px rgba(255,255,255,0.2); margin-bottom:5px;">SAVORA says</h2>
            </div>
            
            <div style="background:rgba(0,255,136,0.03); border:1px solid rgba(0,255,136,0.1); padding:15px; border-radius:8px; margin-bottom:25px; font-size:1.1rem; text-align:center; color: var(--text-dim);">
                <strong style="color:var(--neon-green);">Optiserve Protocol Initiated.</strong><br/>
                Units dispatched.
            </div>
            
            <button onclick="closeSuccessModal()" class="glow-btn" style="width:100%; padding:15px; background:var(--neon-green); color:#000; font-weight:bold; font-size:1rem; border-radius:8px; cursor:pointer; letter-spacing:1px;">
                <span class="btn-text">ACKNOWLEDGE</span>
            </button>
        </div>
    </div>

    <nav class="global-nav">
        <div class="logo">
            <svg class="logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/><path d="m15 9-6 6"/><path d="m9 9 2.5 2.5"/><path d="m15 15-2.5-2.5"/></svg>
            <span class="neon-text">SAVORA</span>
        </div>
        <div class="nav-links">
            <a href="/">Platform Overview</a>
            <a href="/dashboard">Prediction Engine</a>
            <a href="/data" class="active">Industry Insights</a>
        </div>
        <a href="/dashboard" class="nav-cta-btn glow-hover">Launch App</a>
    </nav>

    <main id="fs-map-container" style="position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; z-index: 0;">
        <div id="indiaMap" style="width: 100%; height: 100%;"></div>
    </main>

    <div class="map-overlay-container pointer-events-none" style="position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; padding: 120px 40px 40px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 10;">
        
        <div class="pointer-events-auto anim-item" style="display: flex; flex-direction: column; gap: 1rem;">
            <h1 class="data-header-title" style="font-size: 2.2rem; text-transform: uppercase;">Tracking Console</h1>
            <div class="glass-card" style="padding: 20px; width: 380px; background: rgba(5, 8, 12, 0.85); border: 1px solid var(--accent-primary); box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);">
                <div style="position: relative;">
                    <svg style="position: absolute; left: 15px; top: 12px; color: var(--accent-primary);" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-box" placeholder="Search tracking network..." style="width:100%; padding: 0.8rem 1rem 0.8rem 2.8rem; background:rgba(0,240,255,0.05); border:1px solid rgba(0,240,255,0.2); border-radius:10px; color:#fff; font-family:var(--font-main); outline: none; transition: all 0.3s;" onfocus="this.style.boxShadow='0 0 15px rgba(0,240,255,0.3)'" onblur="this.style.boxShadow='none'">
                </div>
                
                <div style="display:flex; gap:10px; margin-top: 15px;">
                    <select id="filter-cat" style="padding:0.7rem; flex:1; cursor:pointer; background:rgba(0,0,0,0.4); border:1px solid var(--glass-border); border-radius:8px; color:#fff; font-family:var(--font-main); outline:none;">
                        <option value="All">All Tiers</option><option value="Premium">Premium</option><option value="Mid-scale">Mid-scale</option><option value="Budget">Budget</option>
                    </select>
                </div>

                <div id="search-results-dropdown" style="margin-top: 15px; max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;">
                    <!-- JS Injected Results Dropdown -->
                </div>
            </div>
        </div>

        <div id="detail-view-container" class="pointer-events-auto anim-item glass-card" style="position: absolute; bottom: 0; left: 0; width: 100vw; height: 35vh; background: rgba(10, 15, 25, 0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(0, 240, 255, 0.3); border-radius: 20px 20px 0 0; padding: 1.5rem 3rem; display: none; flex-direction: row; gap: 2rem; overflow-y: auto;">
            <!-- Rendered by JS -->
        </div>

    </div>

    <style>
        body { background: var(--bg-main); }
        .diamond-marker {
            width: 14px; height: 14px;
            transform: translateY(-5px) rotate(45deg) !important;
            border: 2px solid #fff;
            box-shadow: 0 0 10px currentColor;
        }
        
        /* High-Visibility Neon Cyberpunk Map Theme (Matches Page 1 & 2) */
        #indiaMap {
            background-color: var(--bg-main) !important;
        }
        #indiaMap .leaflet-tile-pane {
            /* Inverts light tiles, gives sepia base, rotates to vibrant deep blue/cyan, boosts contrast */
            filter: invert(90%) sepia(80%) hue-rotate(185deg) saturate(300%) brightness(0.85) contrast(1.3) !important;
        }
        .leaflet-container {
            font-family: var(--font-main) !important;
        }
    </style>

    <script>
        // Init Particles
        if(document.getElementById('particles-js')) {
            particlesJS('particles-js', {
                "particles": {
                    "number": { "value": 150, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": ["#00f0ff", "#ff0055", "#00ff88", "#7000ff"] },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.8, "random": true, "anim": { "enable": true, "speed": 2, "opacity_min":0.3 } },
                    "size": { "value": 4, "random": true },
                    "line_linked": { "enable": true, "distance": 140, "color": "#00f0ff", "opacity": 0.5, "width": 1.5 },
                    "move": { "enable": true, "speed": 1.5, "direction": "none", "random": true, "out_mode": "out" }
                },
                "interactivity": { "events": { "onhover": { "enable": true, "mode": "grab" } }, "modes": { "grab": { "distance": 220, "line_linked": { "opacity": 1 } } } },
                "retina_detect": true
            });
        }

        // Currency & Modal Globals
        let activeCurrency = 'USD';
        const currencyRates = { 'USD': { rate: 2.5, symbol: '$' }, 'INR': { rate: 207.5, symbol: '₹' } };
        
        function toggleCurrency() {
            activeCurrency = activeCurrency === 'USD' ? 'INR' : 'USD';
            const btn = document.getElementById('curr-toggle-btn');
            if(btn) btn.innerText = activeCurrency;
            
            const slider = document.querySelector('input[type=range]');
            if(window.updateSimulator && slider) {
                window.updateSimulator(slider.value);
            }
        }

        // Modal Logic
        function openNGOModal(name, dist, status, color) {
            document.getElementById('modal-ngo-name').innerText = name;
            document.getElementById('modal-ngo-dist').innerText = dist + ' km';
            document.getElementById('modal-ngo-status').innerText = status.toUpperCase();
            document.getElementById('modal-ngo-status').style.color = color;
            
            const modal = document.getElementById('ngo-modal');
            const content = document.getElementById('ngo-modal-content');
            modal.style.display = 'flex';
            setTimeout(() => { modal.style.opacity = '1'; content.style.transform = 'scale(1)'; }, 10);
        }
        function closeNGOModal() {
            const modal = document.getElementById('ngo-modal');
            const content = document.getElementById('ngo-modal-content');
            modal.style.opacity = '0';
            content.style.transform = 'scale(0.85)';
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }
        
        function openSuccessModal() {
            const modal = document.getElementById('success-modal');
            const content = document.getElementById('success-modal-content');
            modal.style.display = 'flex';
            setTimeout(() => { modal.style.opacity = '1'; content.style.transform = 'scale(1)'; }, 10);
        }
        
        function closeSuccessModal() {
            const modal = document.getElementById('success-modal');
            const content = document.getElementById('success-modal-content');
            modal.style.opacity = '0';
            content.style.transform = 'scale(0.85)';
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        }
        
        function confirmDispatch() {
            closeNGOModal();
            setTimeout(() => {
                openSuccessModal();
            }, 300);
        }

        // Data Set - All Indian Hotels
        const chainsData = [
            { id: 1, name: "Taj Hotels HQ", cat: "Premium", branches: 89, waste: 1250, ai: "Trial Phase", lat: 18.9220, lng: 72.8347 },
            { id: 2, name: "ITC Hotels HQ", cat: "Premium", branches: 115, waste: 1400, ai: "Scaling", lat: 28.5284, lng: 77.2185 },
            { id: 3, name: "Oberoi Group", cat: "Premium", branches: 33, waste: 420, ai: "Pilot", lat: 28.5996, lng: 77.2435 },
            { id: 4, name: "Leela Palaces", cat: "Premium", branches: 11, waste: 210, ai: "None", lat: 12.9600, lng: 77.6433 },
            { id: 5, name: "OYO Premium", cat: "Budget", branches: 450, waste: 8900, ai: "Full Production", lat: 28.4595, lng: 77.0266 },
            { id: 6, name: "Lemon Tree", cat: "Mid-scale", branches: 84, waste: 950, ai: "Trial Phase", lat: 28.5355, lng: 77.1023 },
            { id: 7, name: "Marriott India", cat: "Premium", branches: 135, waste: 2150, ai: "Scaling", lat: 19.0967, lng: 72.8550 },
            { id: 8, name: "Hyatt India", cat: "Premium", branches: 35, waste: 680, ai: "Pilot", lat: 28.5663, lng: 77.1856 },
            { id: 9, name: "Radisson Blu", cat: "Mid-scale", branches: 110, waste: 1320, ai: "Trial Phase", lat: 19.1136, lng: 72.8697 },
            { id: 10, name: "Novotel", cat: "Mid-scale", branches: 21, waste: 350, ai: "Scaling", lat: 22.5804, lng: 88.4716 },
            { id: 11, name: "Ginger Hotels", cat: "Budget", branches: 85, waste: 880, ai: "None", lat: 15.4989, lng: 73.8278 },
            { id: 12, name: "Pride Hotels", cat: "Mid-scale", branches: 18, waste: 250, ai: "None", lat: 23.0225, lng: 72.5714 },
            { id: 13, name: "The Park", cat: "Premium", branches: 12, waste: 180, ai: "Pilot", lat: 22.5539, lng: 88.3512 },
            { id: 14, name: "Trident Hotels", cat: "Mid-scale", branches: 10, waste: 160, ai: "Trial Phase", lat: 26.9124, lng: 75.7873 },
            { id: 15, name: "Sarovar Hotels", cat: "Mid-scale", branches: 95, waste: 1050, ai: "None", lat: 28.5273, lng: 77.2184 }
        ];

        let selectedHotelId = null;

        // Init Map
        const map = L.map('indiaMap').setView([22.5937, 78.9629], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
        
        let markersCluster = L.markerClusterGroup({
            iconCreateFunction: function(cluster) {
                return L.divIcon({ 
                    html: '<div class="custom-cluster" style="width:45px; height:45px;">' + cluster.getChildCount() + '</div>', 
                    className: 'blank-class', 
                    iconSize: L.point(45, 45) 
                });
            }
        });
        map.addLayer(markersCluster);

        // Helper visual functions
        function getColorByAI(ai) {
            if(ai === "Full Production") return '#00f0ff';
            if(ai === "Scaling") return '#00ff88';
            if(ai === "Trial Phase") return '#ff9900';
            if(ai === "Pilot") return '#7000ff';
            return '#ff0055';
        }
        function getAIPercentage(ai) {
            if(ai === "Full Production") return 100;
            if(ai === "Scaling") return 75;
            if(ai === "Trial Phase") return 50;
            if(ai === "Pilot") return 25;
            return 5;
        }

        let optiserveMarkers = [];
        let routingLines = [];

        const NGO_DB = ["Feeding India Hub", "Robin Hood Army", "Annapoorna Trust", "Savora Local Outlet", "NoHunger Foundation", "City Food Bank", "Hope Care Initiative", "Zero Waste Mission"];
        
        function getNGOsForHotel(c) {
            const idx1 = (c.id * 3) % NGO_DB.length;
            const idx2 = (c.id * 7 + 1) % NGO_DB.length;
            const dist1 = ((c.id % 5) + 0.8).toFixed(1);
            const dist2 = ((c.id % 3) + 2.1).toFixed(1);
            
            return [
                { name: NGO_DB[idx1], dist: dist1, status: "Available", color: "var(--neon-green)", lat: c.lat + (0.01 * dist1), lng: c.lng + (0.008 * dist1) },
                { name: NGO_DB[idx2], dist: dist2, status: c.id % 2 === 0 ? "High Demand" : "At Capacity", color: "var(--neon-orange)", lat: c.lat - (0.012 * dist2), lng: c.lng - (0.005 * dist2) }
            ];
        }

        function plotOptiserve(c) {
            optiserveMarkers.forEach(m => map.removeLayer(m));
            routingLines.forEach(l => map.removeLayer(l));
            optiserveMarkers = [];
            routingLines = [];

            const ngos = getNGOsForHotel(c);

            ngos.forEach(ngo => {
                const color = ngo.color;
                const ngoIcon = L.divIcon({
                    html: `<div class="diamond-marker" style="background:${color}; color:${color};"></div>`,
                    className: '', iconSize: [20, 20]
                });
                const m = L.marker([ngo.lat, ngo.lng], { icon: ngoIcon }).addTo(map);
                m.bindTooltip(`<b>${ngo.name}</b><br>${ngo.dist} km radius`, {direction: 'right'});
                optiserveMarkers.push(m);

                // Dashed Routing
                const line = L.polyline([[c.lat, c.lng], [ngo.lat, ngo.lng]], {
                    color: '#ff9900', // Orange Command Center dash
                    weight: 2,
                    dashArray: '5, 8',
                    opacity: 0.9
                }).addTo(map);
                routingLines.push(line);
            });
            return ngos;
        }

        // Render Map & Dropdown Results
        function renderMap() {
            const query = document.getElementById('search-box').value.toLowerCase();
            const cat = document.getElementById('filter-cat').value;

            markersCluster.clearLayers();
            const dropdown = document.getElementById('search-results-dropdown');
            dropdown.innerHTML = '';

            const filtered = chainsData.filter(c => {
                const matchQuery = c.name.toLowerCase().includes(query);
                const matchCat = cat === "All" || c.cat === cat;
                return matchQuery && matchCat;
            });

            filtered.forEach((c) => {
                const colorHex = getColorByAI(c.ai);
                
                // Map Push
                const htmlIcon = L.divIcon({
                    html: `<div class="diamond-marker" style="background:${colorHex}; border-color:${colorHex}; opacity:0.9; box-shadow:0 0 10px ${colorHex};"></div>`,
                    className: '', iconSize: [20, 20]
                });
                const m = L.marker([c.lat, c.lng], { icon: htmlIcon });
                m.bindTooltip(`<div style="font-family:'Outfit'; text-align:center;"><b>${c.name}</b><br>${c.branches} Branches</div>`);
                
                m.on('click', () => {
                    selectedHotelId = c.id;
                    map.setView([c.lat - 1.0, c.lng], 8, { duration: 1.5 });
                    renderDetailView(c);
                    plotOptiserve(c);
                });
                markersCluster.addLayer(m);

                // Dropdown Push
                const resultCard = document.createElement('div');
                resultCard.style = `background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius:8px; padding:12px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; transition: all 0.2s;`;
                resultCard.innerHTML = `
                    <div>
                        <div style="font-weight:600; font-size:0.95rem; color:#fff;">${c.name}</div>
                        <div style="font-size:0.75rem; color:var(--text-dim); margin-top:3px;">${c.branches} Branches • ${c.cat}</div>
                    </div>
                    <div style="width:12px; height:12px; border-radius:50%; background:${colorHex}; box-shadow:0 0 8px ${colorHex};"></div>
                `;
                resultCard.onmouseover = () => { resultCard.style.background = 'rgba(0,240,255,0.1)'; resultCard.style.borderColor = 'rgba(0,240,255,0.3)'; };
                resultCard.onmouseout = () => { resultCard.style.background = 'rgba(255,255,255,0.02)'; resultCard.style.borderColor = 'rgba(255,255,255,0.05)'; };
                resultCard.onclick = () => {
                    document.getElementById('search-box').value = c.name;
                    selectedHotelId = c.id;
                    map.setView([c.lat - 1.0, c.lng], 8, { duration: 1.5 });
                    renderDetailView(c);
                    plotOptiserve(c);
                    renderMap(); // Re-trigger to collapse others
                };
                dropdown.appendChild(resultCard);
            });
        }

        // Detail View UI Generator
        function renderDetailView(c) {
            const dv = document.getElementById('detail-view-container');
            dv.style.display = 'flex';
            
            const color = getColorByAI(c.ai);
            const dailyWaste = Math.round((c.waste / 365) * 1000); 
            let foodSaved = Math.round(dailyWaste * 0.20); 

            window.updateSimulator = function(val) {
                const pct = parseInt(val) / 100;
                foodSaved = Math.round(dailyWaste * pct);
                document.getElementById('sim-food').innerText = foodSaved.toLocaleString() + ' kg';
                document.getElementById('sim-people').innerText = Math.round(foodSaved / 0.5).toLocaleString() + ' meals';
                
                const cData = currencyRates[activeCurrency];
                document.getElementById('sim-cost').innerText = cData.symbol + Math.round(foodSaved * cData.rate).toLocaleString();
            };
            
            const dynamicNGOs = getNGOsForHotel(c);
            let optiHtml = '';
            dynamicNGOs.forEach(ngo => {
                let btnHtml = ngo.status === "Available" 
                    ? `<button onclick="openNGOModal('${ngo.name}', '${ngo.dist}', '${ngo.status}', '${ngo.color}')" class="glow-btn" style="padding:6px 12px; min-width:80px; height:auto; background:var(--neon-green); color:#000; cursor:pointer;"><span class="btn-text">Dispatch</span></button>`
                    : `<button onclick="openNGOModal('${ngo.name}', '${ngo.dist}', '${ngo.status}', '${ngo.color}')" style="border:1px solid var(--neon-orange); color:var(--neon-orange); background:transparent; padding:6px 12px; border-radius:6px; cursor:pointer;">Contact</button>`;
                
                optiHtml += `
                    <div style="background:rgba(0,0,0,0.5); padding:12px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                        <div><div style="font-weight:600; font-size:1rem;">${ngo.name}</div><div style="color:var(--text-dim); font-size:0.8rem;">${ngo.dist} km • <span style="color:${ngo.color}">${ngo.status}</span></div></div>
                        ${btnHtml}
                    </div>
                `;
            });
            
            dv.innerHTML = `
                <div class="anim-item" style="flex: 1.5; padding-right: 30px; border-right: 1px solid rgba(255,255,255,0.1); min-width: 350px;">
                    <div style="margin-bottom: 20px;">
                        <h2 style="font-size: 2.2rem; font-weight:800; color: #fff; margin-bottom:5px;">${c.name}</h2>
                        <p style="color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; font-size: 0.85rem;">HQ Profile & Logistics Analysis</p>
                    </div>
                    
                    <div class="stat-grid" style="grid-template-columns: 1fr 1fr 1fr; margin-bottom: 15px;">
                        <div class="stat-box glow-hover" style="padding:15px;">
                            <div class="stat-box-num" style="color:var(--accent-primary); font-size: 1.5rem;">${c.cat}</div>
                            <div class="stat-box-lbl">Market Position Tier</div>
                        </div>
                        <div class="stat-box glow-hover" style="padding:15px;">
                            <div class="stat-box-num" style="color:var(--neon-green); font-size: 1.5rem;">${c.branches}</div>
                            <div class="stat-box-lbl">Active Branch Network</div>
                        </div>
                        <div class="stat-box glow-hover" style="padding:15px; border: 1px solid rgba(255,0,85,0.4);">
                            <div class="stat-box-num" style="color:var(--neon-red); font-size: 1.5rem;">${dailyWaste}</div>
                            <div class="stat-box-lbl">Est. Everyday Waste (kg)</div>
                        </div>
                    </div>
                </div>

                <div class="anim-item" style="flex: 1; padding: 0 20px; border-right: 1px solid rgba(255,255,255,0.1); min-width: 300px; display:flex; flex-direction:column; justify-content:center;">
                    <h4 style="font-size:1rem; color: #fff; text-transform:uppercase; letter-spacing:1px; margin-bottom:15px;">Impact Simulator</h4>
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px; padding-bottom:10px; border-bottom: 1px solid rgba(255,255,255,0.08);">
                        <span style="color:var(--text-dim)">Est. Food Saved:</span>
                        <span id="sim-food" style="font-weight:bold; color:var(--accent-primary)">${foodSaved.toLocaleString()} kg</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px; padding-bottom:10px; border-bottom: 1px solid rgba(255,255,255,0.08);">
                        <span style="color:var(--text-dim)">Total People Fed:</span>
                        <span id="sim-people" style="font-weight:bold; color:var(--neon-green)">${Math.round(foodSaved / 0.5).toLocaleString()} meals</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                        <span style="color:var(--text-dim); display:flex; align-items:center; gap:8px;">Financial Offset 
                            <button id="curr-toggle-btn" onclick="toggleCurrency()" style="padding:2px 8px; background:rgba(0,240,255,0.1); border:1px solid var(--accent-primary); color:var(--accent-primary); border-radius:4px; font-size:0.7rem; cursor:pointer; font-weight:bold;">USD</button>
                        </span>
                        <span id="sim-cost" style="font-weight:bold; color:var(--neon-orange)">$${Math.round(foodSaved * 2.5).toLocaleString()}</span>
                    </div>
                    <input type="range" id="impact-slider" min="5" max="50" value="20" oninput="window.updateSimulator(this.value)" style="width:100%; accent-color:var(--neon-green); cursor:pointer;">
                </div>

                <div class="anim-item" style="flex: 1; padding-left: 10px; min-width: 300px; overflow-y: auto;">
                    <div style="background: rgba(0, 255, 136, 0.05); border: 1px solid rgba(0, 255, 136, 0.3); border-radius: 12px; padding: 15px;">
                        <h4 style="color:var(--neon-green); margin-bottom:10px; font-size:1.1rem; display:flex; align-items:center; gap:8px;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                            Savora Optiserve™
                        </h4>
                        ${optiHtml}
                    </div>
                </div>
            `;
        }

        // Listeners
        document.getElementById('search-box').addEventListener('input', renderMap);
        document.getElementById('filter-cat').addEventListener('change', renderMap);
        
        // Initialize default loaded layout
        renderMap();
        
        // Auto-select ITC Hotels (Command Center Auto-Open)
        setTimeout(() => {
            const defaultHotel = chainsData[0];
            if(defaultHotel) {
                selectedHotelId = defaultHotel.id;
                map.setView([defaultHotel.lat - 1.0, defaultHotel.lng], 8, { duration: 1.0 });
                renderDetailView(defaultHotel);
                plotOptiserve(defaultHotel);
            }
        }, 800);

    </script>
</body>
</html>
