<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAVORA - Culinary Hologram Matrix</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#00f0ff',
                            dark: '#02040a',
                            neon: '#00ff88',
                            orange: '#ff9900'
                        }
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@11.0.8/dist/framer-motion.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; overflow-x: hidden; background-color: #02040a; }
        .perspective-container { perspective: 1200px; transform-style: preserve-3d; }
        .preserve-3d { transform-style: preserve-3d; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #02040a; }
        ::-webkit-scrollbar-thumb { background: #00f0ff; border-radius: 4px; }

        @keyframes float-y {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    {% raw %}
        const { useState, useEffect, useRef } = React;
        const MotionLib = window.Motion || window.framerMotion;
        const { motion, useScroll, useTransform, useSpring, useAnimationFrame, useMotionValue } = MotionLib;

        // Custom SVGs for Culinary Hologram
        const icons = [
            // Chef Cloche
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-12 h-12 text-brand-blue drop-shadow-[0_0_10px_rgba(0,240,255,0.8)]"><path d="M5.5 13a7.5 7.5 0 0 1 13 0M3 13h18M3 17h18M11 6v-1a1 1 0 0 1 2 0v1" /></svg>,
            // Data Graph
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-12 h-12 text-brand-neon drop-shadow-[0_0_10px_rgba(0,255,136,0.8)]"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>,
            // Fork and Knife
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-12 h-12 text-brand-orange drop-shadow-[0_0_10px_rgba(255,153,0,0.8)]"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>,
            // Globe / Network
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-12 h-12 text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.8)]"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>,
            // Analytics
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-12 h-12 text-brand-blue drop-shadow-[0_0_10px_rgba(0,240,255,0.8)]"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><path d="M21 12H3"/><path d="M12 21V3"/></svg>,
            // Waiter Tray
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-12 h-12 text-brand-neon drop-shadow-[0_0_10px_rgba(0,255,136,0.8)]"><path d="M8 12h8"/><path d="M4 16h16a2 2 0 0 0 2-2H2a2 2 0 0 0 2 2z"/></svg>
        ];

        const RADIUS = 400; // Orbit radius

        function OrbitItem({ index, total, rotation, icon }) {
            const angle = (index / total) * 360;
            
            // To ensure the icon always faces the "camera" (user), 
            // since the parent wrapper rotates by 'rotation', 
            // the child must counter-rotate by -rotation
            const counterRotation = useTransform(rotation, r => -r - angle);

            // Give each element a random slight float delay
            const floatDelay = `-${index * 1.5}s`;

            return (
                <div 
                    className="absolute inset-0 flex items-center justify-center preserve-3d" 
                    style={{ transform: `rotateY(${angle}deg) translateZ(${RADIUS}px)` }}
                >
                    <div style={{ animation: `float-y 6s ease-in-out infinite ${floatDelay}` }}>
                        <motion.div 
                            className="w-28 h-28 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center backdrop-blur-md shadow-[0_0_30px_rgba(0,0,0,0.5)] cursor-pointer hover:border-brand-blue"
                            style={{ rotateY: counterRotation }}
                            whileHover={{ scale: 1.2, boxShadow: "0 0 40px rgba(0, 240, 255, 0.6)" }}
                        >
                            {icon}
                        </motion.div>
                    </div>
                </div>
            );
        }

        function AnimatedSplash({ onComplete }) {
            return (
                <motion.div 
                    initial={{ opacity: 1 }}
                    animate={{ opacity: 0 }}
                    transition={{ duration: 1.5, delay: 2.0 }}
                    onAnimationComplete={onComplete}
                    className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-brand-dark pointer-events-none"
                >
                    <motion.div 
                        initial={{ clipPath: "polygon(0 0, 0 0, 0 100%, 0% 100%)" }}
                        animate={{ clipPath: "polygon(0 0, 100% 0, 100% 100%, 0 100%)" }}
                        transition={{ duration: 1.5, ease: "easeOut" }}
                        className="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-brand-neon to-brand-blue drop-shadow-[0_0_30px_rgba(0,255,136,0.6)] uppercase tracking-[10px] md:tracking-[20px] ml-[10px] md:ml-[20px]"
                    >
                        SAVORA
                    </motion.div>
                    <motion.div
                        initial={{ opacity: 0, y: 20 }}
                        animate={{ opacity: 1, y: 0 }}
                        transition={{ duration: 1.0, delay: 0.8 }}
                        className="mt-6 text-brand-orange tracking-[8px] font-semibold text-sm md:text-base uppercase"
                    >
                        Initializing Neural Engine...
                    </motion.div>
                </motion.div>
            );
        }

        function NavBar() {
            return (
                <nav className="fixed top-0 w-full p-6 px-12 z-40 bg-brand-dark/50 backdrop-blur-lg border-b border-white/5 flex justify-between items-center">
                    <div className="flex items-center gap-4">
                        <svg className="w-8 h-8 text-brand-blue" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/><path d="m15 9-6 6"/><path d="m9 9 2.5 2.5"/><path d="m15 15-2.5-2.5"/></svg>
                        <span className="font-bold text-xl text-transparent bg-clip-text bg-gradient-to-r from-brand-blue to-blue-600 tracking-wider">SAVORA</span>
                    </div>
                    <div className="hidden md:flex gap-8 items-center">
                        <a href="#" className="font-bold text-white text-sm tracking-widest uppercase hover:text-brand-blue transition-colors px-4 py-2 rounded-lg bg-gradient-to-r from-blue-900/40 to-blue-800/40 border border-blue-500/30 shadow-[0_0_15px_rgba(0,100,255,0.4)]">Platform Overview</a>
                        <a href="/dashboard" className="font-semibold text-gray-400 text-sm tracking-wider uppercase hover:text-white transition-colors">Prediction Engine</a>
                        <a href="/data" className="font-semibold text-gray-400 text-sm tracking-wider uppercase hover:text-white transition-colors">Industry Insights</a>
                    </div>
                    <a href="/dashboard" className="px-6 py-2 bg-gradient-to-r from-blue-600 to-brand-blue text-white font-bold rounded-lg uppercase tracking-wider text-sm hover:shadow-[0_0_20px_rgba(0,240,255,0.6)] transition-all">Launch App</a>
                </nav>
            );
        }

        function App() {
            const [showSplash, setShowSplash] = useState(true);
            const { scrollY } = useScroll();
            
            // Smoothed scroll velocity for easing dynamics
            const scrollVelocity = useSpring(scrollY, { stiffness: 400, damping: 90 });
            
            // Base rotation state mapped to Framer's fast C++ loop
            const rotation = useMotionValue(0);

            useAnimationFrame((time, delta) => {
                // Determine direction based on scroll difference? We can just use raw scroll value offset or velocity.
                // A great effect: base slow rotation + rotation proportional to scrollY.
                let baseSpeed = 0.012; // lazy float
                let currentScroll = scrollVelocity.get();
                
                // Add base rotation plus a scroll-dependent multiplier
                // More scrolling down = faster spin
                let scrollModifier = (currentScroll * 0.0004);
                
                let currentRotation = rotation.get();
                rotation.set(currentRotation + (delta * baseSpeed) + scrollModifier);
            });

            return (
                <React.Fragment>
                <div className="bg-brand-dark min-h-screen text-white font-sans selection:bg-brand-blue selection:text-black">
                    {showSplash && <AnimatedSplash onComplete={() => setShowSplash(false)} />}
                    <NavBar />

                    {/* Scrollable Hero Scene tied to Framer Motion constraints */}
                    <div className="h-[200vh]">
                        <div className="sticky top-0 h-screen w-full flex items-center justify-center perspective-container overflow-hidden pt-20">
                        {/* Background glowing orb */}
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-brand-blue/10 rounded-full blur-[100px] -z-10" />

                        {/* Central Hologram Scene */}
                        <motion.div 
                            className="preserve-3d relative w-full h-full flex items-center justify-center"
                            style={{ rotateY: rotation }}
                        >
                            {/* Inner Globe / Neural Core */}
                            <div className="absolute w-72 h-72 bg-blue-900/30 rounded-full border border-brand-blue/30 shadow-[inset_0_0_50px_rgba(0,240,255,0.2),0_0_50px_rgba(0,240,255,0.4)] flex items-center flex-col justify-center preserve-3d" style={{ transform: 'translateZ(0)' }}>
                                <motion.div 
                                    className="text-brand-blue font-black text-3xl tracking-[10px] uppercase text-center drop-shadow-[0_0_15px_rgba(0,240,255,0.8)]"
                                    style={{ rotateY: useTransform(rotation, r => -r) }}
                                >
                                    SAVORA
                                    <div className="text-sm text-brand-neon tracking-[4px] mt-3 font-normal uppercase">Neural Matrix</div>
                                </motion.div>
                            </div>

                            {/* Orbiting Elements */}
                            {icons.map((icon, i) => (
                                <OrbitItem key={i} index={i} total={icons.length} rotation={rotation} icon={icon} />
                            ))}

                        </motion.div>
                        
                        {/* Overlay Text */}
                        <div className="absolute inset-x-0 bottom-16 flex flex-col items-center justify-center pointer-events-none">
                            <h1 className="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400 tracking-tight text-center max-w-4xl drop-shadow-2xl">
                                Synthesize Demand.<br />Eradicate Waste.
                            </h1>
                            <button 
                                onClick={() => document.getElementById('overview-section').scrollIntoView({ behavior: 'smooth' })}
                                className="mt-8 text-brand-blue hover:text-white text-lg md:text-xl tracking-wide font-medium bg-black/60 px-8 py-3 rounded-full border border-brand-blue/50 backdrop-blur-md hover:bg-brand-blue/20 hover:shadow-[0_0_30px_rgba(0,240,255,0.4)] transition-all cursor-pointer inline-flex items-center gap-3 group pointer-events-auto"
                            >
                                Scroll down to accelerate the culinary matrix 
                                <span className="group-hover:translate-y-1 transition-transform">&darr;</span>
                            </button>
                        </div>
                    </div>
                </div>

                {/* NEW SECTION: Platform Overview & How it Works */}
                <div id="overview-section" className="min-h-screen bg-brand-dark relative z-10 flex flex-col items-center pt-32 pb-32 px-6 md:px-12 border-t border-brand-blue/20">
                    <div className="max-w-6xl w-full">
                        <h2 className="text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-brand-blue to-white mb-16 text-center uppercase tracking-[8px]">Platform Overview</h2>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-32">
                            <motion.div whileHover={{ y: -8 }} className="bg-white/5 border border-white/10 p-10 rounded-3xl backdrop-blur-sm shadow-[0_4px_30px_rgba(0,240,255,0.05)] hover:border-brand-blue/30 transition-all cursor-pointer">
                                <div className="w-16 h-16 bg-brand-blue/20 rounded-2xl flex items-center justify-center mb-8 text-brand-blue drop-shadow-[0_0_10px_rgba(0,240,255,0.6)]">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-8 h-8"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
                                </div>
                                <h3 className="text-2xl font-bold mb-4 tracking-wide">Predictive ML Modeling</h3>
                                <p className="text-gray-400 font-medium leading-relaxed tracking-wide">Our neural engine analyzes thousands of historical data points to predict exact footfall and dish demand with 96% accuracy.</p>
                            </motion.div>
                            <motion.div whileHover={{ y: -8 }} className="bg-white/5 border border-white/10 p-10 rounded-3xl backdrop-blur-sm shadow-[0_4px_30px_rgba(0,255,136,0.05)] hover:border-brand-neon/30 transition-all cursor-pointer">
                                <div className="w-16 h-16 bg-brand-neon/20 rounded-2xl flex items-center justify-center mb-8 text-brand-neon drop-shadow-[0_0_10px_rgba(0,255,136,0.6)]">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-8 h-8"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg>
                                </div>
                                <h3 className="text-2xl font-bold mb-4 tracking-wide">Inventory Optimization</h3>
                                <p className="text-gray-400 font-medium leading-relaxed tracking-wide">Eradicate waste by precisely aligning your procurement with future demand. Intelligent par-level adjustments happen in real-time.</p>
                            </motion.div>
                            <motion.div whileHover={{ y: -8 }} className="bg-white/5 border border-white/10 p-10 rounded-3xl backdrop-blur-sm shadow-[0_4px_30px_rgba(255,153,0,0.05)] hover:border-brand-orange/30 transition-all cursor-pointer">
                                <div className="w-16 h-16 bg-brand-orange/20 rounded-2xl flex items-center justify-center mb-8 text-brand-orange drop-shadow-[0_0_10px_rgba(255,153,0,0.6)]">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-8 h-8"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
                                </div>
                                <h3 className="text-2xl font-bold mb-4 tracking-wide">Scenario Sandbox</h3>
                                <p className="text-gray-400 font-medium leading-relaxed tracking-wide">Simulate pricing changes, weather anomalies, and holidays to visually see the impact on your bottom line before they happen.</p>
                            </motion.div>
                        </div>

                        <h2 className="text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-brand-neon to-brand-blue mb-16 text-center uppercase tracking-[8px]">How It Works</h2>
                        
                        <div className="flex flex-col md:flex-row gap-8 relative items-stretch">
                            <div className="absolute top-1/2 left-0 w-full h-1 bg-gradient-to-r from-brand-blue/0 via-brand-blue/50 to-brand-blue/0 hidden md:block -translate-y-1/2 shadow-[0_0_15px_rgba(0,240,255,0.4)]"></div>
                            {[ 
                                { step: '01', title: 'Connect Data', desc: 'Securely plug SAVORA into your POS, weather APIs, and inventory management systems in 1 click.' },
                                { step: '02', title: 'Neural Analysis', desc: 'The engine crunches local events, historical trends, and live data through our proprietary ML models.' },
                                { step: '03', title: 'Actionable Insights', desc: 'Receive daily intuitive dashboards telling you exactly what to prep, buy, and staff for tomorrow.' }
                            ].map((s, i) => (
                                <div key={i} className="flex-1 bg-brand-dark/95 border border-brand-blue/40 rounded-3xl p-10 relative overflow-hidden backdrop-blur-xl shadow-[inset_0_0_30px_rgba(0,240,255,0.05),0_10px_30px_rgba(0,0,0,0.8)]">
                                    <div className="text-7xl font-black text-white/5 absolute -top-4 -right-4">{s.step}</div>
                                    <div className="text-brand-neon font-bold text-xl mb-3 tracking-widest uppercase text-shadow">STEP {s.step}</div>
                                    <h3 className="text-3xl font-bold mb-5">{s.title}</h3>
                                    <p className="text-gray-400 text-lg leading-relaxed">{s.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
                </div>
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    {% endraw %}
    </script>
</body>
</html>
